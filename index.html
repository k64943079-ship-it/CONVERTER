<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOB Code Converter - C# / C++ / Raw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #181825;
            border: 2px solid #313244;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: #cba6f7;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #a6adc8;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #89b4fa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge {
            background: #313244;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #f5c2e7;
        }

        textarea {
            width: 100%;
            padding: 12px 16px;
            background: #1e1e2e;
            border: 2px solid #313244;
            border-radius: 8px;
            color: #cdd6f4;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #cba6f7;
        }

        textarea::placeholder {
            color: #585b70;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-convert {
            background: #cba6f7;
            color: #1e1e2e;
        }

        .btn-convert:hover {
            background: #b4befe;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(203, 166, 247, 0.4);
        }

        .btn-clear {
            background: #313244;
            color: #cdd6f4;
        }

        .btn-clear:hover {
            background: #45475a;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #a6e3a1;
            color: #1e1e2e;
        }

        .btn-copy:hover {
            background: #94e2d5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(166, 227, 161, 0.4);
        }

        .output-section {
            margin-top: 10px;
        }

        .detected-format {
            text-align: center;
            padding: 8px;
            margin-bottom: 15px;
            background: #313244;
            border-radius: 6px;
            font-size: 12px;
            color: #f5c2e7;
        }

        .example-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-example {
            padding: 6px 14px;
            background: #45475a;
            color: #cdd6f4;
            border: 1px solid #585b70;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn-example:hover {
            background: #585b70;
            border-color: #cba6f7;
        }

        .copy-feedback {
            text-align: center;
            color: #a6e3a1;
            font-size: 12px;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        hr {
            border: 1px solid #313244;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 AOB Code Converter</h1>
        <p class="subtitle">C# &harr; C++ &harr; Raw Bytes &harr; HTML</p>

        <div class="example-buttons">
            <span style="color: #a6adc8; font-size: 12px; margin-right: 8px;">Load Example:</span>
            <button class="btn-example" onclick="loadExample('csharp')">C# Format</button>
            <button class="btn-example" onclick="loadExample('cpp')">C++ Format</button>
            <button class="btn-example" onclick="loadExample('raw')">Raw AOB</button>
        </div>

        <div class="input-group">
            <label>
                <span>📥 INPUT</span>
                <span class="badge" id="detectedBadge">Auto-Detect</span>
            </label>
            <textarea 
                id="inputAOB" 
                placeholder="Paste your AOB code here...&#10;&#10;Examples:&#10;C#: FF FF FF FF 00 00 00 00&#10;C++: 0xFF, 0xFF, 0xFF, 0xFF, 0x00, 0x00, 0x00, 0x00&#10;Raw: FF FF FF FF 00 00 00 00"
            ></textarea>
        </div>

        <div class="button-group">
            <button class="btn-convert" onclick="convertAOB()">🔄 Convert All</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ Clear</button>
        </div>

        <div class="detected-format" id="formatDisplay">
            Detected Format: <strong>None</strong>
        </div>

        <div class="output-section">
            <div class="input-group">
                <label>
                    <span>C# FORMAT</span>
                    <span class="badge">byte[]</span>
                </label>
                <textarea id="outputCSharp" readonly placeholder="C# output will appear here..."></textarea>
                <button class="btn-copy" onclick="copyToClipboard('outputCSharp')" style="margin-top: 8px;">📋 Copy C#</button>
                <span class="copy-feedback" id="feedbackCSharp">Copied!</span>
            </div>

            <div class="input-group">
                <label>
                    <span>C++ FORMAT</span>
                    <span class="badge">BYTE[]</span>
                </label>
                <textarea id="outputCpp" readonly placeholder="C++ output will appear here..."></textarea>
                <button class="btn-copy" onclick="copyToClipboard('outputCpp')" style="margin-top: 8px;">📋 Copy C++</button>
                <span class="copy-feedback" id="feedbackCpp">Copied!</span>
            </div>

            <div class="input-group">
                <label>
                    <span>RAW AOB</span>
                    <span class="badge">Hex String</span>
                </label>
                <textarea id="outputRaw" readonly placeholder="Raw AOB output will appear here..."></textarea>
                <button class="btn-copy" onclick="copyToClipboard('outputRaw')" style="margin-top: 8px;">📋 Copy Raw</button>
                <span class="copy-feedback" id="feedbackRaw">Copied!</span>
            </div>

            <div class="input-group">
                <label>
                    <span>HTML ENTITY</span>
                    <span class="badge">Web Safe</span>
                </label>
                <textarea id="outputHTML" readonly placeholder="HTML output will appear here..."></textarea>
                <button class="btn-copy" onclick="copyToClipboard('outputHTML')" style="margin-top: 8px;">📋 Copy HTML</button>
                <span class="copy-feedback" id="feedbackHTML">Copied!</span>
            </div>
        </div>
    </div>

    <script>
        function detectFormat(input) {
            const trimmed = input.trim();
            
            if (trimmed.includes('0x') || trimmed.includes('0X')) {
                return 'cpp';
            }
            
            const hexOnly = /^[0-9A-Fa-f\s?]+$/;
            if (hexOnly.test(trimmed.replace(/\s+/g, ' '))) {
                return 'raw';
            }
            
            return 'unknown';
        }

        function parseBytes(input) {
            const trimmed = input.trim();
            const format = detectFormat(input);
            let bytes = [];

            if (format === 'cpp') {
                const matches = trimmed.match(/0x[0-9A-Fa-f]{1,2}/g);
                if (matches) {
                    bytes = matches.map(m => parseInt(m, 16));
                }
            } else if (format === 'raw') {
                const hexValues = trimmed.split(/[\s,]+/).filter(v => v.length > 0);
                bytes = hexValues.map(v => {
                    const clean = v.replace(/[^0-9A-Fa-f]/g, '');
                    if (clean.length === 0 || clean.length > 2) return null;
                    return parseInt(clean, 16);
                }).filter(b => b !== null && !isNaN(b));
            }

            return bytes;
        }

        function formatCSharp(bytes) {
            if (bytes.length === 0) return '';
            return '0x' + bytes.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(', 0x');
        }

        function formatCpp(bytes) {
            if (bytes.length === 0) return '';
            return bytes.map(b => '0x' + b.toString(16).toUpperCase().padStart(2, '0')).join(', ');
        }

        function formatRaw(bytes) {
            if (bytes.length === 0) return '';
            return bytes.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
        }

        function formatHTML(bytes) {
            if (bytes.length === 0) return '';
            return bytes.map(b => '&#' + b + ';').join(' ');
        }

        function convertAOB() {
            const input = document.getElementById('inputAOB').value;
            const formatDisplay = document.getElementById('formatDisplay');
            const detectedBadge = document.getElementById('detectedBadge');
            
            if (!input.trim()) {
                formatDisplay.innerHTML = 'Detected Format: <strong>None</strong>';
                detectedBadge.textContent = 'No Input';
                clearOutputs();
                return;
            }

            const format = detectFormat(input);
            const bytes = parseBytes(input);

            if (bytes.length === 0) {
                formatDisplay.innerHTML = 'Detected Format: <strong style="color: #f38ba8;">Invalid Input</strong>';
                detectedBadge.textContent = 'Error';
                clearOutputs();
                return;
            }

            // Update format display
            const formatNames = {
                'cpp': 'C++ (0xNN, ...)',
                'raw': 'Raw Hex / C# Style',
                'unknown': 'Unknown'
            };
            formatDisplay.innerHTML = `Detected Format: <strong>${formatNames[format] || format}</strong> | Bytes: <strong>${bytes.length}</strong>`;
            detectedBadge.textContent = formatNames[format] || format;

            // Output conversions
            document.getElementById('outputCSharp').value = formatCSharp(bytes);
            document.getElementById('outputCpp').value = formatCpp(bytes);
            document.getElementById('outputRaw').value = formatRaw(bytes);
            document.getElementById('outputHTML').value = formatHTML(bytes);
        }

        function clearOutputs() {
            document.getElementById('outputCSharp').value = '';
            document.getElementById('outputCpp').value = '';
            document.getElementById('outputRaw').value = '';
            document.getElementById('outputHTML').value = '';
        }

        function clearAll() {
            document.getElementById('inputAOB').value = '';
            clearOutputs();
            document.getElementById('formatDisplay').innerHTML = 'Detected Format: <strong>None</strong>';
            document.getElementById('detectedBadge').textContent = 'Auto-Detect';
        }

        function copyToClipboard(elementId) {
            const textarea = document.getElementById(elementId);
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            try {
                navigator.clipboard.writeText(textarea.value).then(() => {
                    showFeedback(elementId);
                });
            } catch (err) {
                // Fallback
                document.execCommand('copy');
                showFeedback(elementId);
            }
        }

        function showFeedback(elementId) {
            const feedbackMap = {
                'outputCSharp': 'feedbackCSharp',
                'outputCpp': 'feedbackCpp',
                'outputRaw': 'feedbackRaw',
                'outputHTML': 'feedbackHTML'
            };
            
            const feedbackId = feedbackMap[elementId];
            if (feedbackId) {
                const feedback = document.getElementById(feedbackId);
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 1500);
            }
        }

        function loadExample(type) {
            const examples = {
                'csharp': '0xFF, 0xFF, 0xFF, 0xFF, 0x00, 0x00, 0x00, 0x00',
                'cpp': '0xFF, 0xFF, 0xFF, 0xFF, 0x00, 0x00, 0x00, 0x00',
                'raw': 'FF FF FF FF 00 00 00 00'
            };
            
            document.getElementById('inputAOB').value = examples[type] || '';
            convertAOB();
        }

        // Live conversion as user types
        document.getElementById('inputAOB').addEventListener('input', function() {
            convertAOB();
        });

        // Initial example
        window.addEventListener('DOMContentLoaded', () => {
            loadExample('raw');
        });
    </script>
</body>
</html>
